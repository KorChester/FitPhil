<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:14px;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand h1{font-size:18px;font-weight:800;letter-spacing:1px}
.sidebar-brand p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sidebar-nav{flex:1;padding:8px}
.sidebar-nav button{width:100%;text-align:left;padding:10px 14px;border-radius:8px;margin-bottom:2px;font-size:13px;color:rgba(255,255,255,.5);transition:all .15s;display:flex;align-items:center;gap:10px}
.sidebar-nav button:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sidebar-nav button.active{background:rgba(255,255,255,.12);color:#fff}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.3)}
.main{flex:1;overflow-y:auto;padding:32px;max-width:1100px}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5ea;padding:24px;margin-bottom:20px}
.card-sm{padding:16px}
.page-title{font-size:24px;font-weight:700;margin-bottom:24px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#86868b;margin:20px 0 8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{border-radius:12px;padding:16px;border:1px solid}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.stat-value{font-size:22px;font-weight:700;margin-top:4px}
.stat-blue{background:#eff6ff;color:#1d4ed8;border-color:#dbeafe}
.stat-purple{background:#faf5ff;color:#7c3aed;border-color:#f3e8ff}
.stat-green{background:#f0fdf4;color:#15803d;border-color:#dcfce7}
.stat-orange{background:#fff7ed;color:#c2410c;border-color:#ffedd5}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:#86868b;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 12px;border:1px solid #d1d1d6;border-radius:8px;font-size:14px;transition:border-color .15s;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.field textarea{resize:vertical;min-height:70px}
.field .hint{font-size:11px;color:#86868b;margin-top:3px}
.row{display:flex;gap:12px}
.row>.field{flex:1}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a1a2e;color:#fff}.btn-primary:hover{background:#2d2d4a}
.btn-secondary{border:1px solid #d1d1d6;background:#fff}.btn-secondary:hover{background:#f5f5f7}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn:disabled{opacity:.3;cursor:not-allowed}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f2f2f7;transition:background .1s}
.list-item:hover{background:#fafafa}
.list-item:last-child{border-bottom:none}
.list-item-main{flex:1;min-width:0}
.list-item-main .name{font-size:14px;font-weight:500}
.list-item-main .sub{font-size:12px;color:#86868b;margin-top:2px}
.list-actions{display:flex;gap:4px;align-items:center;margin-left:12px;flex-wrap:wrap}
.list-actions button{padding:6px;border-radius:6px;color:#86868b;transition:all .1s}
.list-actions button:hover{background:#f2f2f7;color:#1d1d1f}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-gray{background:#f2f2f7;color:#636366}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#dc2626}
.toolbar{display:flex;gap:8px;margin-bottom:16px}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d1d1d6;border-radius:8px;font-size:13px}
.toolbar input{flex:1}
.toolbar select{background:#fff}
.pos-row{display:flex;gap:8px;align-items:flex-start;padding:10px;background:#f9f9fb;border-radius:8px;margin-bottom:6px}
.pos-row input{padding:6px 10px;border:1px solid #d1d1d6;border-radius:6px;font-size:13px}
.pos-desc{flex:1}.pos-qty{width:60px;text-align:center}.pos-price{width:110px;text-align:right}
.pos-del{padding:4px;color:#c7c7cc;margin-top:3px}.pos-del:hover{color:#dc2626}
.totals{border-top:1px solid #e5e5ea;padding-top:14px;margin-top:14px}
.total-line{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:#86868b}
.total-line.bold{font-weight:700;font-size:15px;color:#1d1d1f;border-top:1px solid #e5e5ea;padding-top:8px;margin-top:6px}
.inv-preview{background:#fff;padding:50px;max-width:210mm;font-family:'Segoe UI',Arial,sans-serif}
.inv-header{display:flex;justify-content:space-between;margin-bottom:40px}
.inv-logo img{max-width:160px;height:auto}
.inv-meta{text-align:right;font-size:11px;line-height:1.6}
.inv-meta b{font-weight:600}
.inv-customer{font-size:12px;line-height:1.6;margin-bottom:10px}
.inv-date{text-align:right;font-size:12px;margin-bottom:20px}
.inv-title{font-weight:700;font-size:15px;margin-bottom:14px}
.inv-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
.inv-table th{text-align:left;padding:6px 4px;font-weight:600;border-bottom:2px solid #000}
.inv-table th:nth-child(2),.inv-table td:nth-child(2){text-align:center;width:50px}
.inv-table th:nth-child(3),.inv-table td:nth-child(3),.inv-table th:nth-child(4),.inv-table td:nth-child(4){text-align:right;width:100px}
.inv-table td{padding:8px 4px;border-bottom:1px solid #eee}
.inv-totals{display:flex;justify-content:flex-end}
.inv-totals-inner{width:230px;font-size:12px}
.inv-totals-inner .row-t{display:flex;justify-content:space-between;padding:2px 0}
.inv-totals-inner .row-t.bold{font-weight:700;border-top:2px solid #000;padding-top:6px;margin-top:4px}
.inv-bank{margin-top:60px;padding-top:14px;border-top:1px solid #ccc;font-size:11px;line-height:1.7}
.empty{text-align:center;padding:60px 20px;color:#86868b}
.empty .icon{font-size:40px;margin-bottom:12px}
.live-preview{background:#f0f4ff;border:2px solid #bfd4ff;border-radius:10px;padding:14px 18px;margin:10px 0;font-size:15px;display:flex;align-items:center;gap:10px}
.live-preview code{font-size:20px;font-weight:700;color:#1d4ed8;letter-spacing:1px}
.live-preview .label{font-size:12px;color:#5b7db1}
@media print{
  .no-print,.sidebar,.main>*:not(#print-area){display:none!important}
  .main{padding:0!important;max-width:none!important}
  #print-area{display:block!important}
  body{background:#fff}
}

.sel-btn{background:#fff;color:#3c3c43;border:1px solid #d1d1d6;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer}
.sel-btn:hover{background:#e5e5ea}
.inv-chk{width:16px;height:16px;cursor:pointer;accent-color:#1d4ed8}
.status-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer;transition:all .15s;user-select:none}
.status-pill:hover{transform:scale(1.05);filter:brightness(0.9)}
.sp-entwurf{background:#f2f2f7;color:#86868b;border:1.5px solid #c7c7cc}
.sp-offen{background:#fef9c3;color:#a16207;border:1.5px solid #facc15}
.sp-bezahlt{background:#dcfce7;color:#15803d;border:1.5px solid #22c55e}
.sp-storniert{background:#fecdd3;color:#be123c;border:1.5px solid #f43f5e}
.ibtn{background:none;border:1px solid #e5e5ea;border-radius:6px;padding:4px 6px;cursor:pointer;font-size:14px;transition:background .15s}
.ibtn:hover{background:#f2f2f7}
</style>
</head>

function load(k,fb){ try{ const d=localStorage.getItem(k); return d?JSON.parse(d):fb; }catch{ return fb; } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

let settings=load("pu-settings",DEFAULTS);
if(!settings.invoicePrefix){settings.invoicePrefix="KF26-";settings.invoiceDigits=4;}
if(!settings.invoiceDigits)settings.invoiceDigits=4;
if(!settings.paypal)settings.paypal="";

let customers=load("pu-customers",[]);
let invoices=load("pu-invoices",[]);
let currentPage="dashboard";

function persist(){ save("pu-settings",settings); save("pu-customers",customers); save("pu-invoices",invoices); }
function fmt(n){ return n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d)return""; const p=d.split("-"); return p[2]+"."+p[1]+"."+p[0]; }
function today(){ return new Date().toISOString().slice(0,10); }
function cName(id){ const c=customers.find(x=>x.id===id); return c?c.name:"–"; }
function cust(id){ return customers.find(x=>x.id===id)||{}; }
function badgeClass(s){ return {entwurf:"badge-gray",offen:"badge-yellow",bezahlt:"badge-green",storniert:"badge-red"}[s]||"badge-gray"; }
function badgeLabel(s){ return {entwurf:"Entwurf",offen:"Offen",bezahlt:"Bezahlt",storniert:"Storniert"}[s]||s; }
function nextInvNum(prefix,num,digits){
  const p=prefix!==undefined?prefix:settings.invoicePrefix;
  const n=num!==undefined?num:settings.nextNumber;
  const d=digits!==undefined?digits:settings.invoiceDigits;
  return p+String(n).padStart(d,"0");
}
function esc(s){ if(!s)return""; const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function invTax(inv){var r=inv.taxRate;return(r!==undefined&&r!==null&&r!=='')?parseFloat(r):19;}
function toNetto(brutto,rate){return rate>0?brutto/(1+rate/100):brutto;}
function invBrutto(inv){return inv.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0);}

function showPage(p){
  currentPage=p;
  document.querySelectorAll(".sidebar-nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+p).classList.add("active");
  render();
}
function render(){
  const m=document.getElementById("main-content");
  if(currentPage==="dashboard") m.innerHTML=renderDashboard();
  else if(currentPage==="customers") m.innerHTML=renderCustomerList();
  else if(currentPage==="invoices") m.innerHTML=renderInvoiceList();
  else if(currentPage==="quartal") m.innerHTML=renderQuartal();
  else if(currentPage==="settings") m.innerHTML=renderSettings();
}

function renderDashboard(){
  const paidT=invoices.filter(i=>i.status==="bezahlt").reduce((s,i)=>s+i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0),0);
  const openT=invoices.filter(i=>i.status!=="bezahlt"&&i.status!=="storniert").reduce((s,i)=>s+i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0),0);
  const recent=[...invoices].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,8);
  return `<h1 class="page-title">Übersicht</h1>
    <div class="stats">
      <div class="stat stat-blue"><div class="stat-label">Kunden</div><div class="stat-value">${customers.length}</div></div>
      <div class="stat stat-purple"><div class="stat-label">Rechnungen</div><div class="stat-value">${invoices.length}</div></div>
      <div class="stat stat-green"><div class="stat-label">Bezahlt</div><div class="stat-value">€ ${fmt(paidT)}</div></div>
      <div class="stat stat-orange"><div class="stat-label">Offen</div><div class="stat-value">€ ${fmt(openT)}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <b>Letzte Rechnungen</b>
        <a href="#" onclick="showPage('invoices');return false" style="font-size:13px">Alle anzeigen →</a>
      </div>
      ${recent.length===0?'<div class="empty"><div class="icon">📄</div><p>Noch keine Rechnungen.</p></div>':
        recent.map(i=>`<div class="list-item">
          <div class="list-item-main">
            <div class="name"><code>${esc(i.invoiceNumber)}</code> <span class="badge ${badgeClass(i.status)}">${badgeLabel(i.status)}</span>${i.type==='fremd'?' <span style="font-size:9px;background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:4px">Fremd</span>':''}</div>
            <div class="sub">${esc(cName(i.customerId))} · ${fmtDate(i.date)}</div>
          </div>
          <b>€ ${fmt(i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0))}</b>
        </div>`).join("")}
    </div>
    <div class="card" style="margin-top:20px">
      <b>Umsatz pro Monat</b>
      <div style="margin-top:16px;overflow-x:auto">${renderMonthlyChart()}</div>
    </div>`;
}

function renderMonthlyChart(){
  const months={};
  invoices.filter(i=>i.status!=="storniert").forEach(i=>{
    if(!i.date)return;
    const key=i.date.slice(0,7);
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0);
    months[key]=(months[key]||0)+b;
  });
  const keys=Object.keys(months).sort().slice(-12);
  if(keys.length===0) return '<div style="color:#86868b;font-size:13px;padding:20px 0">Noch keine Daten.</div>';
  const max=Math.max(...keys.map(k=>months[k]),1);
  const barW=Math.max(32,Math.floor(600/keys.length));
  const h=180;
  let bars=keys.map((k,idx)=>{
    const val=months[k];
    const bh=Math.max(2,Math.round((val/max)*h));
    const [y,m]=k.split('-');
    const label=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][parseInt(m)-1]||m;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:${barW}px">
      <div style="font-size:10px;color:#86868b">€${fmt(val)}</div>
      <div style="width:${Math.min(barW-8,28)}px;height:${bh}px;background:linear-gradient(180deg,#1d4ed8,#3b82f6);border-radius:4px 4px 0 0"></div>
      <div style="font-size:10px;color:#86868b">${label}</div>
      <div style="font-size:9px;color:#c7c7cc">${y}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:4px;min-height:${h+60}px;padding-top:10px">${bars}</div>`;
}

function filterInvoices(){
  const q=(document.getElementById("i-search")||{}).value?.toLowerCase()||"";
  const sf=(document.getElementById("i-filter")||{}).value||"";
  const sy=(document.getElementById("i-year")||{}).value||"";
  const sq=(document.getElementById("i-quarter")||{}).value||"";
  document.querySelectorAll("#invoice-list .list-item").forEach(el=>{
    const matchSearch=el.dataset.search.includes(q);
    const matchStatus=!sf||el.dataset.status===sf;
    const matchYear=!sy||el.dataset.year===sy;
    const matchQ=!sq||el.dataset.q===sq;
    el.style.display=(matchSearch&&matchStatus&&matchYear&&matchQ)?"":"none";
  });
}
function changeStatus(id,newStatus){
  const inv=invoices.find(x=>x.id===id);if(!inv)return;
  inv.status=newStatus;persist();
  // Direct DOM update without full render
  const el=document.querySelector('[data-id="'+id+'"]');
  if(!el)return;
  el.dataset.status=newStatus;
  const pill=el.querySelector('.status-pill');
  if(pill){
    pill.className='status-pill sp-'+newStatus;
    pill.textContent=badgeLabel(newStatus);
    pill.setAttribute('data-next',newStatus==='entwurf'?'offen':newStatus==='offen'?'bezahlt':newStatus==='bezahlt'?'storniert':'entwurf');
  }
  filterInvoices();
}
function deleteInvoice(id){ if(!confirm("Rechnung wirklich löschen?"))return; invoices=invoices.filter(x=>x.id!==id); persist(); render(); }
function getSelectedIds(){
  var ids=[];
  document.querySelectorAll('.inv-chk:checked').forEach(function(el){
    if(el.closest('.list-item').style.display!=='none') ids.push(el.dataset.id);
  });
  return ids;
}
function updateSelBar(){
  var ids=getSelectedIds();
  var cnt=document.getElementById('sel-count');
  if(cnt){cnt.textContent=ids.length>0?ids.length+' ausgewählt':'0 ausgewählt';cnt.style.color=ids.length>0?'#1d4ed8':'#86868b';}
}
function toggleAllInv(checked){
  document.querySelectorAll('.inv-chk').forEach(function(el){
    if(el.closest('.list-item').style.display!=='none') el.checked=checked;
  });
  updateSelBar();
}
function selAction(action){
  var ids=getSelectedIds();
  if(ids.length===0){alert('Keine Rechnungen ausgewählt.');return;}
  if(action==='delete'){
    if(!confirm(ids.length+' Rechnung(en) unwiderruflich löschen?'))return;
    invoices=invoices.filter(function(i){return ids.indexOf(i.id)<0;});
    persist();render();return;
  }
  if(action==='pdf'){
    var list=invoices.filter(function(i){return ids.indexOf(i.id)>=0;});
    if(!confirm(list.length+' Rechnung(en) als PDFs in ZIP exportieren?'))return;
    exportAllPDFs(list);return;
  }
  if(!confirm(ids.length+' Rechnung(en) auf "'+badgeLabel(action)+'" setzen?'))return;
  ids.forEach(function(id){
    var inv=invoices.find(function(x){return x.id===id;});
    if(inv)inv.status=action;
  });
  persist();render();
}
function duplicateInvoice(id){
  const orig=invoices.find(x=>x.id===id); if(!orig)return;
  const num=nextInvNum(); settings.nextNumber++;
  const copy={...JSON.parse(JSON.stringify(orig)),id:uid(),invoiceNumber:num,date:today(),status:"entwurf"};
  invoices.push(copy); persist(); render();
}

    items:[{id:uid(),description:"",quantity:1,brutto:0}],status:"entwurf",paymentSource:"",notes:"",taxRate:19,type:"eigen"};

        <div style="display:flex;gap:8px">
          <select id="if-customer" onchange="onCustomerSelected()" style="flex:1"><option value="">– Kunde wählen –</option>
            ${customers.sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`<option value="${c.id}" ${inv.customerId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}

        <select id="if-source"><option value="">– optional –</option>

function changeTaxRate(val){
  window._editInv.taxRate=parseFloat(val);
  var inv=window._editInv;
  var totalB=inv.items.reduce(function(a,x){return a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1);},0);
  var tr=invTax(inv);var totalN=toNetto(totalB,tr);var totalM=totalB-totalN;
  var en=document.getElementById('t-netto'),em=document.getElementById('t-mwst'),eb=document.getElementById('t-brutto'),el=document.getElementById('t-mwst-label');
  if(en)en.textContent='€ '+fmt(totalN);
  if(em)em.textContent='€ '+fmt(totalM);
  if(eb)eb.textContent='€ '+fmt(totalB);
  if(el)el.textContent='MwSt. '+tr+'%';
}
function updatePos(idx,field,val){
  if(field==="quantity") val=parseInt(val)||1;
  if(field==="brutto") val=parseFloat(val)||0;
  window._editInv.items[idx][field]=val;
  const totalB=window._editInv.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0);
  const tr=invTax(window._editInv);const totalN=toNetto(totalB,tr);const totalM=totalB-totalN;
  var el=document.getElementById('t-mwst-label');if(el)el.textContent='MwSt. '+tr+'%';
  const en=document.getElementById("t-netto"),em=document.getElementById("t-mwst"),eb=document.getElementById("t-brutto");
  if(en)en.textContent="€ "+fmt(totalN); if(em)em.textContent="€ "+fmt(totalM); if(eb)eb.textContent="€ "+fmt(totalB);
}
function addPos(){ window._editInv.items.push({id:uid(),description:"",quantity:1,brutto:0}); renderInvoiceForm(); }
function removePos(idx){ window._editInv.items.splice(idx,1); renderInvoiceForm(); }
function saveInvoice(){
  const inv=window._editInv;
  inv.customerId=document.getElementById("if-customer").value;
  inv.date=document.getElementById("if-date").value;
  inv.servicePeriod=document.getElementById("if-period").value.trim();
  inv.paymentSource=document.getElementById("if-source").value;
  inv.type=(document.getElementById('if-type')||{}).value||'eigen';
  inv.taxRate=parseFloat((document.getElementById('if-taxrate')||{}).value)||19;
  inv.notes=document.getElementById("if-notes").value.trim();
  if(!inv.customerId){ alert("Bitte einen Kunden wählen."); return; }
  if(!inv.date){ alert("Bitte ein Datum eingeben."); return; }
  if(!inv.items.some(x=>x.description.trim()&&x.brutto>0)){ alert("Mindestens eine Position mit Beschreibung und Betrag."); return; }
  if(window._editIsNew){ inv.invoiceNumber=nextInvNum(); settings.nextNumber++; invoices.push(inv); }
  else { const idx=invoices.findIndex(x=>x.id===inv.id); if(idx>=0) invoices[idx]=inv; }
  persist(); showPage("invoices");
}

function importData(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.type==="customers_only"){
        if(!confirm("Kundendaten importieren? Neue Kunden werden hinzugefügt, bestehende aktualisiert."))return;
        let added=0,updated=0;
        data.customers.forEach(c=>{
          const idx=customers.findIndex(x=>x.id===c.id);
          if(idx>=0){customers[idx]=c;updated++;}else{customers.push(c);added++;}
        });

        alert(`Import erfolgreich! ${added} neue, ${updated} aktualisiert.`);
      } else {
        if(!confirm("Kompletter Import: Alle Daten werden ersetzt. Fortfahren?"))return;
        if(data.settings)settings=data.settings;
        if(data.customers)customers=data.customers;
        if(data.invoices)invoices=data.invoices;
        persist(); render();
        alert("Komplett-Import erfolgreich!");
      }
    }catch(err){ alert("Fehler: "+err.message); }
  };
  reader.readAsText(file); input.value="";
}

// ── CSV Import ────────────────────────────────
function parseCSV(text){
  // Remove BOM character
  text=text.replace(/^\ufeff/,'');
  const firstLine=text.split('\n')[0];
  let delim=',';
  if(firstLine.split(';').length>3) delim=';';
  else if(firstLine.split('\t').length>3) delim='\t';
  const lines=text.trim().split('\n');
  const headers=lines[0].split(delim).map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=lines[i].split(delim).map(v=>v.trim().replace(/^"|"$/g,''));
    const obj={};
    headers.forEach((h,idx)=>{obj[h]=vals[idx]||'';});
    rows.push(obj);
  }
  return {headers,rows};
}

function findCol(headers,candidates){
  for(const c of candidates){
    const found=headers.find(h=>h.toLowerCase().includes(c.toLowerCase()));
    if(found)return found;
  }
  return null;
}

function handleCSVUpload(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const {headers,rows}=parseCSV(e.target.result);
      if(rows.length===0){alert("CSV ist leer.");return;}
      const colName=findCol(headers,['Name']);
      const colBrutto=findCol(headers,['Brutto']);
      const colDesc=findCol(headers,['Artikelbezeichnung','Betreff','Beschreibung']);
      const colDatum=findCol(headers,['Datum']);
      const colEmail=findCol(headers,['Absender E-Mail','E-Mail','Email']);
      const colStreet=findCol(headers,['Adresszeile 1','Straße','Strasse']);
      const colCity=findCol(headers,['Ort','Stadt','City']);
      const colZip=findCol(headers,['PLZ','Postleitzahl']);
      const colCountry=findCol(headers,['Land','Country']);
      if(!colName||!colBrutto){
        alert("CSV muss mindestens die Spalten 'Name' und 'Brutto' enthalten.");return;
      }
      window._csvData={rows,colName,colBrutto,colDesc,colDatum,colEmail,colStreet,colCity,colZip,colCountry};
      renderCSVPreview();
    }catch(err){alert("Fehler beim Lesen: "+err.message);}
  };
  reader.readAsText(file,'UTF-8');
  input.value="";
}

function renderCSVPreview(){

    // Parse DDMMYYYY or DD.MM.YYYY
    let datum='';
    if(datumRaw){
      const raw2=datumRaw.replace(/[.\-\/]/g,'').trim();
      if(raw2.length>=7&&raw2.length<=8&&/^\d+$/.test(raw2)){
        let dd2,mm2,yy2;
        if(raw2.length===8){dd2=raw2.slice(0,2);mm2=raw2.slice(2,4);yy2=raw2.slice(4);}
        else{dd2='0'+raw2.slice(0,1);mm2=raw2.slice(1,3);yy2=raw2.slice(3);}

      const dotM2=datumRaw.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      if(dotM2) datum=dotM2[1].padStart(2,'0')+'.'+dotM2[2].padStart(2,'0')+'.'+dotM2[3];

      const csvStreet=d.colStreet?r[d.colStreet]:'';

function toggleAllCSV(checked){
  const d=window._csvData;

    const el=document.getElementById('csv-chk-'+i);

function executeCSVImport(){
  const d=window._csvData;
  const globalDesc=document.getElementById('csv-global-desc').value.trim();
  const globalPeriod=document.getElementById('csv-global-period').value.trim();
  let created=0, newCust=0;
  const noAddr=[];

  for(let i=0;i<d.rows.length;i++){
    const el=document.getElementById('csv-chk-'+i);
    if(!el||!el.checked)continue;
    const r=d.rows[i];
    const name=(r[d.colName]||'').trim();
    if(!name)continue;
    const bruttoNum=parseFloat((r[d.colBrutto]||'0').replace(',','.'))||0;
    if(bruttoNum<=0)continue;
    const desc=globalDesc||(d.colDesc?r[d.colDesc]:'')||'Coaching';

    let c=customers.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(!c){
      c={id:uid(),name:name,
        street:d.colStreet?(r[d.colStreet]||''):'',
        zip:d.colZip?(r[d.colZip]||''):'',
        city:d.colCity?(r[d.colCity]||''):'',
        country:d.colCountry?(r[d.colCountry]||'Deutschland'):'Deutschland',
        email:d.colEmail?(r[d.colEmail]||''):'',
        notes:'Per CSV-Import angelegt'};
      customers.push(c); newCust++;
    }
    if(!c.street&&!c.zip&&!c.city) noAddr.push(c.name);

    // Parse date from CSV (format: DDMMYYYY or DD.MM.YYYY)
    var csvDate=today();
    if(d.colDatum&&r[d.colDatum]){
      var raw=r[d.colDatum].replace(/[.\-\/]/g,'').trim();
      if(raw.length>=7&&raw.length<=8&&/^\d+$/.test(raw)){
        var dd,mm,yyyy;
        if(raw.length===8){dd=raw.slice(0,2);mm=raw.slice(2,4);yyyy=raw.slice(4);}
        else{dd='0'+raw.slice(0,1);mm=raw.slice(1,3);yyyy=raw.slice(3);}
        csvDate=yyyy+'-'+mm+'-'+dd;
      }
      // Try DD.MM.YYYY format
      var dotM=(r[d.colDatum]||'').match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      if(dotM) csvDate=dotM[3]+'-'+dotM[2].padStart(2,'0')+'-'+dotM[1].padStart(2,'0');
    }

    invoices.push({id:uid(),invoiceNumber:nextInvNum(),customerId:c.id,date:csvDate,
      servicePeriod:globalPeriod,
      items:[{id:uid(),description:desc,quantity:1,brutto:bruttoNum}],
      status:'entwurf',paymentSource:'paypal',notes:'Per CSV-Import erstellt'});
    settings.nextNumber++;
    created++;
  }

  persist();
  const unique=[...new Set(noAddr)];
  let msg=`Import abgeschlossen!\n\n${created} Rechnung(en) erstellt\n${newCust} neue(r) Kunde(n) angelegt\n\nAlle Rechnungen haben Status "Entwurf".`;
  if(unique.length>0) msg+=`\n\n⚠️ Folgende Kunden haben KEINE Adresse:\n${unique.join(', ')}\n\nBitte unter Kunden → Bearbeiten die Adressen nachtragen!`;
  alert(msg);
  showPage('invoices');
}

function onCustomerSelected(){
  const cid=document.getElementById("if-customer").value;
  if(!cid||!window._editIsNew)return;
  const inv=window._editInv;
  if(inv.items.some(x=>x.description.trim()||x.brutto>0))return;
  const lastInv=[...invoices].filter(i=>i.customerId===cid).sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
  if(!lastInv)return;
  if(!confirm(`Daten von letzter Rechnung (${lastInv.invoiceNumber}) übernehmen?`))return;
  inv.customerId=cid;
  inv.items=lastInv.items.map(x=>({id:uid(),description:x.description,quantity:x.quantity,brutto:x.brutto}));
  inv.servicePeriod=lastInv.servicePeriod||'';
  inv.paymentSource=lastInv.paymentSource||'';
  renderInvoiceForm();
}

function renderQuartal(){
  const valid=invoices.filter(i=>i.status!=="storniert"&&i.date);

  valid.forEach(i=>{
    const y=i.date.slice(0,4);

    const q=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
    if(!years[y])years[y]={Q1:{n:0,b:0},Q2:{n:0,b:0},Q3:{n:0,b:0},Q4:{n:0,b:0}};
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0);
    years[y][q].b+=b;
    years[y][q].n++;

  const sortedYears=Object.keys(years).sort().reverse();
  if(sortedYears.length===0) return `<h1 class="page-title">Quartalsübersicht</h1><div class="card"><div class="empty"><div class="icon">📈</div><p>Noch keine Rechnungen vorhanden.</p></div></div>`;

          </tr></thead>
          <tbody>${top15.map(([cid,total])=>{
            const ci=yearInvs.filter(x=>x.customerId===cid);
            const cnt=ci.length;
            const posCount=ci.reduce((a,x)=>a+x.items.filter(p=>p.description).length,0);
            const avg=cnt>0?total/cnt:0;
            const dates=ci.map(x=>x.date).filter(Boolean).sort();
            const first=dates.length>0?dates[0]:'';
            const last=dates.length>0?dates[dates.length-1]:'';
            const descMap={};
            ci.forEach(x=>x.items.forEach(p=>{if(p.description)descMap[p.description]=(descMap[p.description]||0)+1;}));
            const topDesc=Object.entries(descMap).sort((a,b)=>b[1]-a[1]);
            const mainDesc=topDesc.length>0?topDesc[0][0]:'–';
            return '<tr style="border-bottom:1px solid #f2f2f7">'
              +'<td style="padding:8px 6px;font-weight:600;white-space:nowrap">'+esc(cName(cid))+'</td>'
              +'<td style="padding:8px 6px;text-align:center;font-weight:700;color:#1d4ed8">'+cnt+'</td>'
              +'<td style="padding:8px 6px;text-align:center;color:#86868b">'+posCount+'</td>'
              +'<td style="padding:8px 6px;text-align:right;font-weight:600">€ '+fmt(total)+'</td>'
              +'<td style="padding:8px 6px;text-align:right;color:#86868b">€ '+fmt(avg)+'</td>'
              +'<td style="padding:8px 6px;font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(mainDesc)+'</td>'
              +'<td style="padding:8px 6px;text-align:center;font-size:11px;color:#86868b">'+fmtDate(first)+'</td>'
              +'<td style="padding:8px 6px;text-align:center;font-size:11px;color:#86868b">'+fmtDate(last)+'</td>'
              +'</tr>';
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  })();

  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <h1 class="page-title" style="margin:0">Quartalsübersicht</h1>
    ${yearSelect}
  </div>${content}`;
}

function updateTaxCalc(y){
  const rate=parseFloat(document.getElementById('tax-rate-'+y).value)||0;
  const sq=window._quartalQ||'all';
  const valid=invoices.filter(i=>{
    if(i.status==='storniert'||!i.date||!i.date.startsWith(y))return false;
    if(sq==='all')return true;
    const m=parseInt(i.date.slice(5,7));
    const q=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
    return q===sq;
  });
  const total=valid.reduce((s,i)=>s+invBrutto(i),0);
  const netto=valid.reduce((s,i)=>s+toNetto(invBrutto(i),invTax(i)),0);
  const tax=netto*(rate/100);
  const net=netto-tax;
  const el1=document.getElementById('net-income-'+y);
  const el2=document.getElementById('tax-amount-'+y);
  const el3=document.getElementById('monthly-'+y);
  if(el1)el1.textContent='€ '+fmt(net);
  if(el2)el2.textContent=`Steuer: € ${fmt(tax)} · Netto: € ${fmt(netto)} × ${100-rate}%`;
  if(el3)el3.textContent='€ '+fmt(net/((window._quartalQ&&window._quartalQ!=='all')?3:12));
}

function exportQuartalCSV(year){
  const invs=invoices.filter(i=>i.status!=="storniert"&&i.date&&i.date.startsWith(year));
  let csv="Rechnungsnummer;Datum;Kunde;Beschreibung;Netto;MwSt;Brutto;Quartal\n";
  invs.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(i=>{
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0)*(parseInt(x.quantity)||1),0);
    const n=toNetto(b,invTax(i)); const mw=b-n;
    const m=parseInt(i.date.slice(5,7));
    const q=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
    const desc=i.items.map(x=>x.description).join(' / ');
    csv+=`${i.invoiceNumber};${fmtDate(i.date)};${cName(i.customerId)};${desc};${fmt(n)};${fmt(mw)};${fmt(b)};${q}\n`;
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`PU_Quartalsübersicht_${year}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

function checkBackupReminder(){
  const lastBackup=localStorage.getItem('pu-last-backup');
  const reminderDays=14;
  if(!lastBackup){
    localStorage.setItem('pu-last-backup',new Date().toISOString());
    return;
  }
  const daysSince=Math.floor((Date.now()-new Date(lastBackup).getTime())/(1000*60*60*24));
  if(daysSince>=reminderDays&&invoices.length>0){
    setTimeout(()=>{
      if(confirm(`Du hast seit ${daysSince} Tagen kein Backup gemacht.\n\nMöchtest du jetzt deine Daten exportieren?\n\n(Einstellungen → Alles exportieren)`)){
        showPage('settings');
      }
      localStorage.setItem('pu-last-backup',new Date().toISOString());
    },1500);
  }
}

// ── PDF Invoice Import ────────────────────────
async function handlePDFUpload(input){
  const files=Array.from(input.files);
  if(files.length===0)return;
  if(typeof pdfjsLib==='undefined'){alert("PDF.js nicht geladen.");return;}
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const results=[];
  for(const file of files){
    try{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const page=await pdf.getPage(1);
      const tc=await page.getTextContent();
      var raw=tc.items.map(function(i){return i.str;}).join(' ').replace(/\s+/g,' ').trim();
      // Phase 1: Fix compound words broken by kerning
      raw=raw.replace(/K\s*F/g,'KF');
      raw=raw.replace(/(\w)\s*ße/g,'$1ße');
      raw=raw.replace(/(\w{3,})\s(\w)(?=\s)/g,'$1$2');
      raw=raw.replace(/Rechnungs\s*nummer/gi,'Rechnungsnummer');
      raw=raw.replace(/Deutsch\s*land/gi,'Deutschland');
      raw=raw.replace(/Umsatz\s*steuer/gi,'Umsatzsteuer');
      raw=raw.replace(/RECH\s*NUNG/gi,'RECHNUNG');
      raw=raw.replace(/Zwischen\s*summe/gi,'Zwischensumme');
      raw=raw.replace(/Einzel\s*preis/gi,'Einzelpreis');
      raw=raw.replace(/G\s*e\s*s\s*a\s*m\s*t/g,'Gesamt');
      // Phase 2: Join split digits aggressively
      for(var p=0;p<5;p++) raw=raw.replace(/(\d)\s+(\d)/g,'$1$2');
      // Phase 3: Fix dots, commas, hyphens between digits
      raw=raw.replace(/(\d)\s*\.\s*(\d)/g,'$1.$2');
      raw=raw.replace(/(\d)\s*,\s*(\d)/g,'$1,$2');
      raw=raw.replace(/(\d)\s*-\s*(\d)/g,'$1-$2');
      console.log('PDF normalized:',file.name,raw);
      var parsed=parsePDFInvoice(raw);
      if(parsed){parsed.fileName=file.name;results.push(parsed);}
      else{results.push({error:true,fileName:file.name,errorMsg:'Struktur nicht erkannt'});}
    }catch(err){
      console.error('PDF error:',file.name,err);
      results.push({error:true,fileName:file.name,errorMsg:String(err.message||err)});
    }
  }
  window._pdfData=results;
  renderPDFPreview();
  input.value='';
}

function parsePDFInvoice(text){
  try{
    var invNum='';
    var m1=text.match(/KF\d+-\d+/);
    if(m1)invNum=m1[0];
    var invDate='';
    var m2=text.match(/(\d{2})\.(\d{2})\.(\d{4})/);
    if(m2)invDate=m2[3]+'-'+m2[2]+'-'+m2[1];
    var brutto=0;
    // Strategy 1: Find "Gesamt" + amount
    var re=/Gesamt\s+.?\s*([\d.,]+)/g;
    var lastMatch=null;var m3;
    while((m3=re.exec(text))!==null){lastMatch=m3;}
    if(lastMatch)brutto=parseFloat(lastMatch[1].replace('.','').replace(',','.'))||0;
    // Strategy 2: Find last € + amount  
    if(brutto===0){
      var re2=/\u20ac\s*([\d.,]+)/g;
      var lm2=null;var m4;
      while((m4=re2.exec(text))!==null){lm2=m4;}
      if(lm2)brutto=parseFloat(lm2[1].replace('.','').replace(',','.'))||0;
    }
    // Strategy 3: Find last currency-like number (XXX,XX pattern) near end of text
    if(brutto===0){
      var allAmounts=text.match(/\d{2,},\d{2}/g);
      if(allAmounts&&allAmounts.length>0){
        brutto=parseFloat(allAmounts[allAmounts.length-1].replace('.','').replace(',','.'))||0;
      }
    }
    var custName='',custStreet='',custZip='',custCity='',custCountry='Deutschland';
    if(invNum&&m2){
      var afterInv=text.indexOf(invNum)+invNum.length;
      var beforeDate=text.indexOf(m2[0],afterInv);
      if(beforeDate>afterInv){
        var ct=text.substring(afterInv,beforeDate).trim();
        ct=ct.replace(/^(Herr|Herrn|Frau)\s+/i,'');
        ct=ct.replace(/Umsatzsteuer\S*:?\s*\S+\s*$/i,'').trim();
        var cm=ct.match(/\s+(Deutschland|Germany|Schweiz)\s*$/i);
        if(cm){custCountry=cm[1];ct=ct.substring(0,ct.lastIndexOf(cm[1])).trim();}
        var pm=ct.match(/(\d{5,})\s+(.+)$/);
        if(pm){
          var numStr=pm[1];
          var bp;
          if(numStr.length>5){
            custZip=numStr.slice(-5);
            bp=ct.substring(0,ct.indexOf(numStr)).trim()+' '+numStr.slice(0,-5);
          }else{
            custZip=numStr;
            bp=ct.substring(0,ct.indexOf(numStr)).trim();
          }
          custCity=pm[2].replace(/[.,]+$/,'').trim();
          var sm=bp.match(/^(.+?)\s+(\S*(?:stra(?:ss|ß)e|str\.?|weg|gasse|allee|platz|ring)\s+\S+)$/i);
          if(!sm)sm=bp.match(/^(.+?)\s+(\S+\s+(?:Stra(?:ss|ß)e|Str\.?|Weg|Gasse|Allee|Platz|Ring)\s+\S+)$/i);
          if(sm){custName=sm[1].trim();custStreet=sm[2].trim();}
          else{
            var words=bp.split(/\s+/);
            var si=-1;
            for(var w=words.length-1;w>=1;w--){if(/\d/.test(words[w])){si=w;break;}}
            if(si>=2){custName=words.slice(0,si-1).join(' ');custStreet=words.slice(si-1).join(' ');}
            else if(si>=1){custName=words.slice(0,si).join(' ');custStreet=words.slice(si).join(' ');}
            else custName=bp;
          }
        }else{
          var cm2=ct.match(/,\s*(\d{4,5})\s+(.*)/);
          if(!cm2) cm2=ct.match(/,(\d{4,5})\s*(.*)/);  // handle no-space after comma
          if(cm2){
            var addrFull=ct.substring(0,ct.indexOf(cm2[0]));
            custZip=cm2[1];custCity=cm2[2].replace(/[.,]+$/,'').trim();
            var ws=addrFull.split(/\s+/);
            var si2=-1;
            for(var w2=ws.length-1;w2>=1;w2--){if(/\d/.test(ws[w2])){si2=w2;break;}}
            if(si2>=2){custName=ws.slice(0,si2-1).join(' ');custStreet=ws.slice(si2-1).join(' ');}
            else if(si2>=1){custName=ws.slice(0,si2).join(' ');custStreet=ws.slice(si2).join(' ');}
            else custName=addrFull;
          }else{custName=ct;}
        }
      }
    }
    var itemDesc='';
    var ri=text.search(/\sRECHNUNG\s/);
    var zi=text.search(/Zwischensumme|Zwischen summe/i);
    if(ri>=0&&zi>ri){
      var it=text.substring(ri+10,zi).trim();
      it=it.replace(/Variante\s+Menge\s+Einzelpreis\s+Gesamt\s*/i,'');
      it=it.replace(/\u20ac\s*[\d.,]+/g,'').replace(/\s+\d+$/,'').replace(/\s+/g,' ').trim();
      itemDesc=it;
    }
    console.log('Parsed:',invNum,custName,custStreet,custZip,custCity,brutto,invDate,itemDesc);
    if(!invNum&&!custName)return null;
    return{invNum:invNum,invDate:invDate,brutto:brutto,custName:custName,custStreet:custStreet,custZip:custZip,custCity:custCity,custCountry:custCountry,itemDesc:itemDesc};
  }catch(e){console.error('Parse error:',e);return null;}
}

      <div style="font-size:12px;margin-top:4px">${bad.map(b=>esc(b.fileName)).join(', ')}</div>
    </div>`:''}
    <div class="card">
      <p style="font-size:13px;color:#86868b;margin-bottom:16px"><b>${good.length} Rechnungen</b> erkannt. Prüfe die Daten und importiere.</p>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid #000">
          <th style="padding:8px;width:30px"><input type="checkbox" checked onchange="toggleAllPDF(this.checked)"></th>
          <th style="padding:8px;text-align:left;font-size:12px;font-weight:600">RE-Nr.</th>
          <th style="padding:8px;text-align:left;font-size:12px;font-weight:600">Kunde</th>
          <th style="padding:8px;text-align:left;font-size:12px;font-weight:600">Adresse</th>
          <th style="padding:8px;text-align:left;font-size:12px;font-weight:600">Leistung</th>
          <th style="padding:8px;text-align:right;font-size:12px;font-weight:600">Brutto</th>
          <th style="padding:8px;text-align:left;font-size:12px;font-weight:600">Datum</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
      <div class="btn-group" style="margin-top:20px">
        <button class="btn btn-primary" onclick="executePDFImport()">✓ Ausgewählte importieren</button>
        <button class="btn btn-secondary" onclick="showPage('invoices')">Abbrechen</button>
      </div>
    </div>`;
}
function toggleAllPDF(checked){
  const good=window._pdfData.filter(r=>!r.error);
  for(let i=0;i<good.length;i++){const el=document.getElementById('pdf-chk-'+i);if(el)el.checked=checked;}
}
function executePDFImport(){
  const good=window._pdfData.filter(r=>!r.error);
  let created=0,newCust=0,skipped=0;
  for(let i=0;i<good.length;i++){
    const el=document.getElementById('pdf-chk-'+i);
    if(!el||!el.checked)continue;
    const r=good[i];
    if(!r.custName||r.brutto<=0)continue;
    let c=customers.find(x=>x.name.toLowerCase()===r.custName.toLowerCase());
    if(!c){
      c={id:uid(),name:r.custName,street:r.custStreet||'',zip:r.custZip||'',
        city:r.custCity||'',country:r.custCountry||'Deutschland',email:'',
        notes:'Per PDF-Import angelegt'};
      customers.push(c);newCust++;
    } else if(!c.street&&r.custStreet){c.street=r.custStreet;c.zip=r.custZip;c.city=r.custCity;}
    if(invoices.find(x=>x.invoiceNumber===r.invNum)){skipped++;continue;}
    invoices.push({id:uid(),invoiceNumber:r.invNum||nextInvNum(),customerId:c.id,
      date:r.invDate||today(),servicePeriod:'',
      items:[{id:uid(),description:r.itemDesc||'Coaching',quantity:1,brutto:r.brutto}],
      status:'bezahlt',paymentSource:'bank',notes:'PDF-Import: '+r.fileName});
    if(!r.invNum){settings.nextNumber++;}
    created++;
  }
  persist();
  let msg=`PDF-Import abgeschlossen!\n\n${created} Rechnung(en) importiert\n${newCust} neue(r) Kunde(n) angelegt`;
  if(skipped>0)msg+=`\n${skipped} übersprungen (Nummer existiert bereits)`;
  alert(msg);
  showPage('invoices');
}

// ── Batch PDF Export as ZIP ───────────────────
async function exportAllPDFs(list){
  if(typeof jspdf==='undefined'&&typeof window.jspdf==='undefined'){alert("PDF-Bibliothek nicht geladen.");return;}
  if(typeof JSZip==='undefined'){alert("ZIP-Bibliothek nicht geladen.");return;}
  if(typeof html2canvas==='undefined'){alert("html2canvas nicht geladen.");return;}
  var jsPDF=window.jspdf.jsPDF;
  var zip=new JSZip();
  var container=document.createElement('div');
  container.style.cssText='position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:40px;font-family:Segoe UI,Arial,sans-serif;font-size:11pt;color:#000';
  document.body.appendChild(container);
  var progress=document.createElement('div');
  progress.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:2px solid #1d4ed8;border-radius:16px;padding:32px 48px;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center';
  progress.innerHTML='<div style="font-size:18px;font-weight:700;margin-bottom:8px">PDFs werden erstellt...</div><div id="pdf-progress" style="font-size:14px;color:#86868b">0 / '+list.length+'</div>';
  document.body.appendChild(progress);
  for(var idx=0;idx<list.length;idx++){
    var inv=list[idx];
    document.getElementById('pdf-progress').textContent=(idx+1)+' / '+list.length+' – '+inv.invoiceNumber;
    container.innerHTML=buildInvoiceWord(inv);
    await new Promise(function(r){setTimeout(r,100);});
    try{
      var canvas=await html2canvas(container,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
      var imgData=canvas.toDataURL('image/jpeg',0.95);
      var pdf=new jsPDF('p','mm','a4');
      var pdfW=pdf.internal.pageSize.getWidth();
      var pdfH=pdf.internal.pageSize.getHeight();
      var imgW=pdfW-20;
      var imgH=(canvas.height*imgW)/canvas.width;
      if(imgH>pdfH-20){imgH=pdfH-20;imgW=(canvas.width*imgH)/canvas.height;}
      pdf.addImage(imgData,'JPEG',10,10,imgW,imgH);
      var pdfBlob=pdf.output('blob');
      var fileName=inv.invoiceNumber+' Rechnung - '+cName(inv.customerId)+'.pdf';
      zip.file(fileName,pdfBlob);
    }catch(e){console.error('PDF error for',inv.invoiceNumber,e);}
  }
  document.body.removeChild(container);
  document.body.removeChild(progress);
  try{
    var zipBlob=await zip.generateAsync({type:'blob'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(zipBlob);
    a.download='PU_Rechnungen_'+today()+'.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    alert(list.length+' Rechnungen als ZIP heruntergeladen!');
  }catch(e){alert('Fehler beim ZIP-Erstellen: '+e.message);}
}
