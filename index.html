<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIT PHIL COACHING · Rechnungs-App</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:14px;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand h1{font-size:18px;font-weight:800;letter-spacing:1px}
.sidebar-brand p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sidebar-nav{flex:1;padding:8px}
.sidebar-nav button{width:100%;text-align:left;padding:10px 14px;border-radius:8px;margin-bottom:2px;font-size:13px;color:rgba(255,255,255,.5);transition:all .15s;display:flex;align-items:center;gap:10px}
.sidebar-nav button:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sidebar-nav button.active{background:rgba(255,255,255,.12);color:#fff}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.3)}
.main{flex:1;overflow-y:auto;padding:32px;max-width:1100px}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5ea;padding:24px;margin-bottom:20px}
.card-sm{padding:16px}
.page-title{font-size:24px;font-weight:700;margin-bottom:24px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#86868b;margin:20px 0 8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{border-radius:12px;padding:16px;border:1px solid}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.stat-value{font-size:22px;font-weight:700;margin-top:4px}
.stat-blue{background:#eff6ff;color:#1d4ed8;border-color:#dbeafe}
.stat-purple{background:#faf5ff;color:#7c3aed;border-color:#f3e8ff}
.stat-green{background:#f0fdf4;color:#15803d;border-color:#dcfce7}
.stat-orange{background:#fff7ed;color:#c2410c;border-color:#ffedd5}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:#86868b;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 12px;border:1px solid #d1d1d6;border-radius:8px;font-size:14px;transition:border-color .15s;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.field textarea{resize:vertical;min-height:70px}
.field .hint{font-size:11px;color:#86868b;margin-top:3px}
.row{display:flex;gap:12px}
.row>.field{flex:1}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a1a2e;color:#fff}.btn-primary:hover{background:#2d2d4a}
.btn-secondary{border:1px solid #d1d1d6;background:#fff}.btn-secondary:hover{background:#f5f5f7}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn:disabled{opacity:.3;cursor:not-allowed}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f2f2f7;transition:background .1s}
.list-item:hover{background:#fafafa}
.list-item:last-child{border-bottom:none}
.list-item-main{flex:1;min-width:0}
.list-item-main .name{font-size:14px;font-weight:500}
.list-item-main .sub{font-size:12px;color:#86868b;margin-top:2px}
.list-actions{display:flex;gap:4px;align-items:center;margin-left:12px;flex-wrap:wrap}
.list-actions button{padding:6px;border-radius:6px;color:#86868b;transition:all .1s}
.list-actions button:hover{background:#f2f2f7;color:#1d1d1f}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-gray{background:#f2f2f7;color:#636366}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#dc2626}
.toolbar{display:flex;gap:8px;margin-bottom:16px}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d1d1d6;border-radius:8px;font-size:13px}
.toolbar input{flex:1}
.toolbar select{background:#fff}
.pos-row{display:flex;gap:8px;align-items:flex-start;padding:10px;background:#f9f9fb;border-radius:8px;margin-bottom:6px}
.pos-row input{padding:6px 10px;border:1px solid #d1d1d6;border-radius:6px;font-size:13px}
.pos-desc{flex:1}.pos-qty{width:60px;text-align:center}.pos-price{width:110px;text-align:right}
.pos-del{padding:4px;color:#c7c7cc;margin-top:3px}.pos-del:hover{color:#dc2626}
.totals{border-top:1px solid #e5e5ea;padding-top:14px;margin-top:14px}
.total-line{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:#86868b}
.total-line.bold{font-weight:700;font-size:15px;color:#1d1d1f;border-top:1px solid #e5e5ea;padding-top:8px;margin-top:6px}
.inv-preview{background:#fff;padding:50px;max-width:210mm;font-family:'Segoe UI',Arial,sans-serif}
.inv-header{display:flex;justify-content:space-between;margin-bottom:40px}
.inv-logo img{max-width:160px;height:auto}
.inv-meta{text-align:right;font-size:11px;line-height:1.6}
.inv-meta b{font-weight:600}
.inv-customer{font-size:12px;line-height:1.6;margin-bottom:10px}
.inv-date{text-align:right;font-size:12px;margin-bottom:20px}
.inv-title{font-weight:700;font-size:15px;margin-bottom:14px}
.inv-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
.inv-table th{text-align:left;padding:6px 4px;font-weight:600;border-bottom:2px solid #000}
.inv-table th:nth-child(2),.inv-table td:nth-child(2){text-align:center;width:50px}
.inv-table th:nth-child(3),.inv-table td:nth-child(3),.inv-table th:nth-child(4),.inv-table td:nth-child(4){text-align:right;width:100px}
.inv-table td{padding:8px 4px;border-bottom:1px solid #eee}
.inv-totals{display:flex;justify-content:flex-end}
.inv-totals-inner{width:230px;font-size:12px}
.inv-totals-inner .row-t{display:flex;justify-content:space-between;padding:2px 0}
.inv-totals-inner .row-t.bold{font-weight:700;border-top:2px solid #000;padding-top:6px;margin-top:4px}
.inv-bank{margin-top:60px;padding-top:14px;border-top:1px solid #ccc;font-size:11px;line-height:1.7}
.empty{text-align:center;padding:60px 20px;color:#86868b}
.empty .icon{font-size:40px;margin-bottom:12px}
.live-preview{background:#f0f4ff;border:2px solid #bfd4ff;border-radius:10px;padding:14px 18px;margin:10px 0;font-size:15px;display:flex;align-items:center;gap:10px}
.live-preview code{font-size:20px;font-weight:700;color:#1d4ed8;letter-spacing:1px}
.live-preview .label{font-size:12px;color:#5b7db1}
@media print{
  .no-print,.sidebar,.main>*:not(#print-area){display:none!important}
  .main{padding:0!important;max-width:none!important}
  #print-area{display:block!important}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar no-print">
    <div class="sidebar-brand"><h1>Coaching</h1><p>Rechnung Generator</p></div>
    <nav class="sidebar-nav">
      <button onclick="showPage('dashboard')" id="nav-dashboard" class="active"><span>📊</span> Übersicht</button>
      <button onclick="showPage('customers')" id="nav-customers"><span>👥</span> Kunden</button>
      <button onclick="showPage('invoices')" id="nav-invoices"><span>📄</span> Rechnungen</button>
      <button onclick="showPage('quartal')" id="nav-quartal"><span>📈</span> Quartale</button>
      <button onclick="showPage('settings')" id="nav-settings"><span>⚙️</span> Einstellungen</button>
    </nav>
    <div class="sidebar-footer">v1.3 · made by Chang</div>
  </div>
  <div class="main" id="main-content"></div>
</div>

const DEFAULTS={
  companyName:"Fit Phil Coaching",ownerName:"Stanley Philipp Jendreiek",street:"Sylviastr. 14",
  zip:"45131",city:"Essen",email:"",
  taxNumber:"112/5185/3889",iban:"DE34 3605 0105 0002 1969 13",bic:"SPESDE3EXXX",
  paypal:"",
  invoicePrefix:"FP26-",nextNumber:1,invoiceDigits:4
};

function load(k,fb){ try{ const d=localStorage.getItem(k); return d?JSON.parse(d):fb; }catch{ return fb; } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

let settings=load("fpc-settings",DEFAULTS);
if(!settings.invoicePrefix){settings.invoicePrefix="FP26-";settings.invoiceDigits=4;}
if(!settings.invoiceDigits)settings.invoiceDigits=4;
if(!settings.paypal)settings.paypal="";

let customers=load("fpc-customers",[]);
let invoices=load("fpc-invoices",[]);
let currentPage="dashboard";

function persist(){ save("fpc-settings",settings); save("fpc-customers",customers); save("fpc-invoices",invoices); }
function fmt(n){ return n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d)return""; const p=d.split("-"); return p[2]+"."+p[1]+"."+p[0]; }
function today(){ return new Date().toISOString().slice(0,10); }
function cName(id){ const c=customers.find(x=>x.id===id); return c?c.name:"–"; }
function cust(id){ return customers.find(x=>x.id===id)||{}; }
function badgeClass(s){ return {entwurf:"badge-gray",offen:"badge-yellow",bezahlt:"badge-green",storniert:"badge-red"}[s]||"badge-gray"; }
function badgeLabel(s){ return {entwurf:"Entwurf",offen:"Offen",bezahlt:"Bezahlt",storniert:"Storniert"}[s]||s; }
function nextInvNum(prefix,num,digits){
  const p=prefix!==undefined?prefix:settings.invoicePrefix;
  const n=num!==undefined?num:settings.nextNumber;
  const d=digits!==undefined?digits:settings.invoiceDigits;
  return p+String(n).padStart(d,"0");
}
function esc(s){ if(!s)return""; const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function showPage(p){
  currentPage=p;
  document.querySelectorAll(".sidebar-nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+p).classList.add("active");
  render();
}
function render(){
  const m=document.getElementById("main-content");
  if(currentPage==="dashboard") m.innerHTML=renderDashboard();
  else if(currentPage==="customers") m.innerHTML=renderCustomerList();
  else if(currentPage==="invoices") m.innerHTML=renderInvoiceList();
  else if(currentPage==="quartal") m.innerHTML=renderQuartal();
  else if(currentPage==="settings") m.innerHTML=renderSettings();
}

function renderDashboard(){
  const paidT=invoices.filter(i=>i.status==="bezahlt").reduce((s,i)=>s+i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0),0);
  const openT=invoices.filter(i=>i.status!=="bezahlt"&&i.status!=="storniert").reduce((s,i)=>s+i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0),0);
  const recent=[...invoices].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,8);
  return `<h1 class="page-title">Übersicht</h1>
    <div class="stats">
      <div class="stat stat-blue"><div class="stat-label">Kunden</div><div class="stat-value">${customers.length}</div></div>
      <div class="stat stat-purple"><div class="stat-label">Rechnungen</div><div class="stat-value">${invoices.length}</div></div>
      <div class="stat stat-green"><div class="stat-label">Bezahlt</div><div class="stat-value">€ ${fmt(paidT)}</div></div>
      <div class="stat stat-orange"><div class="stat-label">Offen</div><div class="stat-value">€ ${fmt(openT)}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <b>Letzte Rechnungen</b>
        <a href="#" onclick="showPage('invoices');return false" style="font-size:13px">Alle anzeigen →</a>
      </div>
      ${recent.length===0?'<div class="empty"><div class="icon">📄</div><p>Noch keine Rechnungen.</p></div>':
        recent.map(i=>`<div class="list-item">
          <div class="list-item-main">
            <div class="name"><code>${esc(i.invoiceNumber)}</code> <span class="badge ${badgeClass(i.status)}">${badgeLabel(i.status)}</span></div>
            <div class="sub">${esc(cName(i.customerId))} · ${fmtDate(i.date)}</div>
          </div>
          <b>€ ${fmt(i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0))}</b>
        </div>`).join("")}
    </div>
    <div class="card" style="margin-top:20px">
      <b>Umsatz pro Monat</b>
      <div style="margin-top:16px;overflow-x:auto">${renderMonthlyChart()}</div>
    </div>`;
}

function renderMonthlyChart(){
  const months={};
  invoices.filter(i=>i.status!=="storniert").forEach(i=>{
    if(!i.date)return;
    const key=i.date.slice(0,7);
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0);
    months[key]=(months[key]||0)+b;
  });
  const keys=Object.keys(months).sort().slice(-12);
  if(keys.length===0) return '<div style="color:#86868b;font-size:13px;padding:20px 0">Noch keine Daten.</div>';
  const max=Math.max(...keys.map(k=>months[k]),1);
  const barW=Math.max(32,Math.floor(600/keys.length));
  const h=180;
  let bars=keys.map((k,idx)=>{
    const val=months[k];
    const bh=Math.max(2,Math.round((val/max)*h));
    const [y,m]=k.split('-');
    const label=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][parseInt(m)-1]||m;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:${barW}px">
      <div style="font-size:10px;color:#86868b">€${fmt(val)}</div>
      <div style="width:${Math.min(barW-8,28)}px;height:${bh}px;background:linear-gradient(180deg,#1d4ed8,#3b82f6);border-radius:4px 4px 0 0"></div>
      <div style="font-size:10px;color:#86868b">${label}</div>
      <div style="font-size:9px;color:#c7c7cc">${y}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:4px;min-height:${h+60}px;padding-top:10px">${bars}</div>`;
}

function changeStatus(id,status){ const inv=invoices.find(x=>x.id===id); if(inv){ inv.status=status; persist(); } }

function duplicateInvoice(id){
  const orig=invoices.find(x=>x.id===id); if(!orig)return;
  const num=nextInvNum(); settings.nextNumber++;
  const copy={...JSON.parse(JSON.stringify(orig)),id:uid(),invoiceNumber:num,date:today(),status:"entwurf"};
  invoices.push(copy); persist(); render();
}

function updatePos(idx,field,val){
  if(field==="quantity") val=parseInt(val)||1;
  if(field==="brutto") val=parseFloat(val)||0;
  window._editInv.items[idx][field]=val;
  const totalB=window._editInv.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0);
  const totalN=totalB/1.19; const totalM=totalB-totalN;
  const en=document.getElementById("t-netto"),em=document.getElementById("t-mwst"),eb=document.getElementById("t-brutto");
  if(en)en.textContent="€ "+fmt(totalN); if(em)em.textContent="€ "+fmt(totalM); if(eb)eb.textContent="€ "+fmt(totalB);
}

function removePos(idx){ window._editInv.items.splice(idx,1); renderInvoiceForm(); }
function saveInvoice(){
  const inv=window._editInv;
  inv.customerId=document.getElementById("if-customer").value;
  inv.date=document.getElementById("if-date").value;
  inv.servicePeriod=document.getElementById("if-period").value.trim();
  inv.paymentSource=document.getElementById("if-source").value;
  inv.notes=document.getElementById("if-notes").value.trim();
  if(!inv.customerId){ alert("Bitte einen Kunden wählen."); return; }
  if(!inv.date){ alert("Bitte ein Datum eingeben."); return; }
  if(!inv.items.some(x=>x.description.trim()&&x.brutto>0)){ alert("Mindestens eine Position mit Beschreibung und Betrag."); return; }
  if(window._editIsNew){ inv.invoiceNumber=nextInvNum(); settings.nextNumber++; invoices.push(inv); }
  else { const idx=invoices.findIndex(x=>x.id===inv.id); if(idx>=0) invoices[idx]=inv; }
  persist(); showPage("invoices");
}

function exportPDF(id){
  const inv=invoices.find(x=>x.id===id); if(!inv)return;
  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Rechnung ${inv.invoiceNumber}</title>
    <style>
      @page{size:A4;margin:20mm}
      body{font-family:'Segoe UI',Arial,sans-serif;margin:0;padding:20mm;color:#000;font-size:11pt}
    </style></head><body>${buildInvoiceWord(inv)}</body></html>`);
  w.document.close(); setTimeout(()=>w.print(),400);
}

function exportWord(id){
  const inv=invoices.find(x=>x.id===id); if(!inv)return;
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8">
    <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
    <style>
      @page{size:210mm 297mm;margin:20mm}
      body{font-family:'Segoe UI',Arial,sans-serif;font-size:11pt;color:#000;margin:0;padding:0}
      table{border-collapse:collapse}
    </style></head>
    <body>${buildInvoiceWord(inv)}</body></html>`;

function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
function importData(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.type==="customers_only"){
        if(!confirm("Kundendaten importieren? Neue Kunden werden hinzugefügt, bestehende aktualisiert."))return;
        let added=0,updated=0;
        data.customers.forEach(c=>{
          const idx=customers.findIndex(x=>x.id===c.id);
          if(idx>=0){customers[idx]=c;updated++;}else{customers.push(c);added++;}
        });
        persist(); render();
        alert(`Import erfolgreich! ${added} neue, ${updated} aktualisiert.`);
      } else {
        if(!confirm("Kompletter Import: Alle Daten werden ersetzt. Fortfahren?"))return;
        if(data.settings)settings=data.settings;
        if(data.customers)customers=data.customers;
        if(data.invoices)invoices=data.invoices;
        persist(); render();
        alert("Komplett-Import erfolgreich!");
      }
    }catch(err){ alert("Fehler: "+err.message); }
  };
  reader.readAsText(file); input.value="";
}

function parseCSV(text){
  const firstLine=text.split('\n')[0];
  let delim=',';
  if(firstLine.split('\t').length>3) delim='\t';
  else if(firstLine.split(';').length>3) delim=';';
  const lines=text.trim().split('\n');
  const headers=lines[0].split(delim).map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=lines[i].split(delim).map(v=>v.trim().replace(/^"|"$/g,''));
    const obj={};
    headers.forEach((h,idx)=>{obj[h]=vals[idx]||'';});
    rows.push(obj);
  }
  return {headers,rows};
}

function findCol(headers,candidates){
  for(const c of candidates){
    const found=headers.find(h=>h.toLowerCase().includes(c.toLowerCase()));
    if(found)return found;
  }
  return null;
}

function handleCSVUpload(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const {headers,rows}=parseCSV(e.target.result);
      if(rows.length===0){alert("CSV ist leer.");return;}
      const colName=findCol(headers,['Name']);
      const colBrutto=findCol(headers,['Brutto']);
      const colDesc=findCol(headers,['Artikelbezeichnung','Betreff','Beschreibung']);
      const colDatum=findCol(headers,['Datum']);
      const colEmail=findCol(headers,['Absender E-Mail','E-Mail','Email']);
      const colStreet=findCol(headers,['Adresszeile 1','Straße','Strasse']);
      const colCity=findCol(headers,['Ort','Stadt','City']);
      const colZip=findCol(headers,['PLZ','Postleitzahl']);
      const colCountry=findCol(headers,['Land','Country']);
      if(!colName||!colBrutto){
        alert("CSV muss mindestens die Spalten 'Name' und 'Brutto' enthalten.");return;
      }
      window._csvData={rows,colName,colBrutto,colDesc,colDatum,colEmail,colStreet,colCity,colZip,colCountry};
      renderCSVPreview();
    }catch(err){alert("Fehler beim Lesen: "+err.message);}
  };
  reader.readAsText(file,'UTF-8');
  input.value="";
}

function toggleAllCSV(checked){
  const d=window._csvData;
  for(let i=0;i<d.rows.length;i++){
    const el=document.getElementById('csv-chk-'+i);
    if(el)el.checked=checked;
  }
}

function executeCSVImport(){
  const d=window._csvData;
  const globalDesc=document.getElementById('csv-global-desc').value.trim();
  const globalPeriod=document.getElementById('csv-global-period').value.trim();
  let created=0, newCust=0;

  for(let i=0;i<d.rows.length;i++){
    const el=document.getElementById('csv-chk-'+i);
    if(!el||!el.checked)continue;
    const r=d.rows[i];
    const name=(r[d.colName]||'').trim();
    if(!name)continue;
    const bruttoNum=parseFloat((r[d.colBrutto]||'0').replace(',','.'))||0;
    if(bruttoNum<=0)continue;
    const desc=globalDesc||(d.colDesc?r[d.colDesc]:'')||'Coaching';

    let c=customers.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(!c){
      c={id:uid(),name:name,
        street:d.colStreet?(r[d.colStreet]||''):'',
        zip:d.colZip?(r[d.colZip]||''):'',
        city:d.colCity?(r[d.colCity]||''):'',
        country:d.colCountry?(r[d.colCountry]||'Deutschland'):'Deutschland',
        email:d.colEmail?(r[d.colEmail]||''):'',
        notes:'Per CSV-Import angelegt'};
      customers.push(c); newCust++;
    }

    invoices.push({id:uid(),invoiceNumber:nextInvNum(),customerId:c.id,date:today(),
      servicePeriod:globalPeriod,
      items:[{id:uid(),description:desc,quantity:1,brutto:bruttoNum}],
      status:'entwurf',paymentSource:'paypal',notes:'Per CSV-Import erstellt'});
    settings.nextNumber++;
    created++;
  }

  persist();
  alert(`Import abgeschlossen!\n\n${created} Rechnung(en) erstellt\n${newCust} neue(r) Kunde(n) angelegt\n\nAlle Rechnungen haben Status "Entwurf" – prüfe sie bei Bedarf.`);
  showPage('invoices');
}

function onCustomerSelected(){
  const cid=document.getElementById("if-customer").value;
  if(!cid||!window._editIsNew)return;
  const inv=window._editInv;
  if(inv.items.some(x=>x.description.trim()||x.brutto>0))return;
  const lastInv=[...invoices].filter(i=>i.customerId===cid).sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
  if(!lastInv)return;
  if(!confirm(`Daten von letzter Rechnung (${lastInv.invoiceNumber}) übernehmen?`))return;
  inv.customerId=cid;
  inv.items=lastInv.items.map(x=>({id:uid(),description:x.description,quantity:x.quantity,brutto:x.brutto}));
  inv.servicePeriod=lastInv.servicePeriod||'';
  inv.paymentSource=lastInv.paymentSource||'';
  renderInvoiceForm();
}

function renderQuartal(){
  const years={};
  invoices.filter(i=>i.status!=="storniert"&&i.date).forEach(i=>{
    const y=i.date.slice(0,4);
    const m=parseInt(i.date.slice(5,7));
    const q=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
    const key=y;
    if(!years[key])years[key]={Q1:{n:0,b:0},Q2:{n:0,b:0},Q3:{n:0,b:0},Q4:{n:0,b:0}};
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0);
    years[key][q].b+=b;
    years[key][q].n++;
  });
  const sortedYears=Object.keys(years).sort().reverse();

  let content=sortedYears.map(y=>{
    const d=years[y];
    const yearTotal=d.Q1.b+d.Q2.b+d.Q3.b+d.Q4.b;
    return `<div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <b style="font-size:18px">${y}</b>
        <span style="font-size:15px;font-weight:700">Gesamt: € ${fmt(yearTotal)}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:2px solid #000">
            <th style="padding:8px 4px;text-align:left">Quartal</th>
            <th style="padding:8px 4px;text-align:right">Anzahl</th>
            <th style="padding:8px 4px;text-align:right">Netto</th>
            <th style="padding:8px 4px;text-align:right">MwSt. 19%</th>
            <th style="padding:8px 4px;text-align:right;font-weight:700">Brutto</th>
          </tr>
        </thead>
        <tbody>
          ${['Q1','Q2','Q3','Q4'].map(q=>{
            const netto=d[q].b/1.19;
            const mwst=d[q].b-netto;
            return `<tr style="border-bottom:1px solid #f2f2f7">
              <td style="padding:8px 4px;font-weight:500">${q} (${q==='Q1'?'Jan–Mär':q==='Q2'?'Apr–Jun':q==='Q3'?'Jul–Sep':'Okt–Dez'})</td>
              <td style="padding:8px 4px;text-align:right">${d[q].n}</td>
              <td style="padding:8px 4px;text-align:right">€ ${fmt(netto)}</td>
              <td style="padding:8px 4px;text-align:right">€ ${fmt(mwst)}</td>
              <td style="padding:8px 4px;text-align:right;font-weight:600">€ ${fmt(d[q].b)}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr style="border-top:2px solid #000">
            <td style="padding:8px 4px;font-weight:700">Summe ${y}</td>
            <td style="padding:8px 4px;text-align:right;font-weight:700">${d.Q1.n+d.Q2.n+d.Q3.n+d.Q4.n}</td>
            <td style="padding:8px 4px;text-align:right;font-weight:700">€ ${fmt(yearTotal/1.19)}</td>
            <td style="padding:8px 4px;text-align:right;font-weight:700">€ ${fmt(yearTotal-yearTotal/1.19)}</td>
            <td style="padding:8px 4px;text-align:right;font-weight:700">€ ${fmt(yearTotal)}</td>
          </tr>
        </tfoot>
      </table>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="exportQuartalCSV('${y}')">📦 CSV Export für ${y}</button>
      </div>
    </div>`;
  }).join('');

  return `<h1 class="page-title">Quartalsübersicht</h1>
    ${sortedYears.length===0?'<div class="card"><div class="empty"><div class="icon">📈</div><p>Noch keine Rechnungen vorhanden.</p></div></div>':content}`;
}

function exportQuartalCSV(year){
  const invs=invoices.filter(i=>i.status!=="storniert"&&i.date&&i.date.startsWith(year));
  let csv="Rechnungsnummer;Datum;Kunde;Beschreibung;Netto;MwSt;Brutto;Quartal\n";
  invs.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(i=>{
    const b=i.items.reduce((a,x)=>a+(parseFloat(x.brutto)||0),0);
    const n=b/1.19; const mw=b-n;
    const m=parseInt(i.date.slice(5,7));
    const q=m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
    const desc=i.items.map(x=>x.description).join(' / ');
    csv+=`${i.invoiceNumber};${fmtDate(i.date)};${cName(i.customerId)};${desc};${fmt(n)};${fmt(mw)};${fmt(b)};${q}\n`;
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`FPC_Quartalsübersicht_${year}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

function checkBackupReminder(){
  const lastBackup=localStorage.getItem('fpc-last-backup');
  const reminderDays=14;
  if(!lastBackup){
    localStorage.setItem('fpc-last-backup',new Date().toISOString());
    return;
  }
  const daysSince=Math.floor((Date.now()-new Date(lastBackup).getTime())/(1000*60*60*24));
  if(daysSince>=reminderDays&&invoices.length>0){
    setTimeout(()=>{
      if(confirm(`Du hast seit ${daysSince} Tagen kein Backup gemacht.\n\nMöchtest du jetzt deine Daten exportieren?\n\n(Einstellungen → Alles exportieren)`)){
        showPage('settings');
      }
      localStorage.setItem('fpc-last-backup',new Date().toISOString());
    },1500);
  }
}

render();
checkBackupReminder();
</script>
